name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Rust kurulum
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Node kurulum
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Tauri build
        run: npm run tauri build